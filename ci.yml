name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.12'
          enable-cache: true
      - name: Install dev dependencies
        run: uv pip install --system -e '.[dev]'
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .

  typecheck:
    name: Mypy
    runs-on: ubuntu-latest
    # Brownfield: don't block the workflow until the codebase is annotated.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.12'
          enable-cache: true
      - name: Install dev dependencies
        run: uv pip install --system -e '.[dev]'
      - name: Type check
        run: mypy

  smoke:
    name: Import smoke test (${{ matrix.os }} / py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ['3.10', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install (Linux Qt deps)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libdbus-1-3 libxcb-cursor0
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install .
      - name: Import onthespot
        run: python -c "import onthespot; print('ok')"
